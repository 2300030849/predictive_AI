<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
</head>
<body>
<h2>Prediction Logs</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Air Temp</th>
<th>Process Temp</th>
<th>Rot Speed</th>
<th>Torque</th>
<th>Tool Wear</th>
<th>Probability</th>
<th>Status</th>
</tr>

{% for row in rows %}
<tr>
{% for col in row %}
<td>{{ col }}</td>
{% endfor %}
</tr>
{% endfor %}

</table>

</body>
</html>
